server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.masdechile.cl;
    ssl_certificate     /etc/ssl/masdechile/self.crt;
    ssl_certificate_key /etc/ssl/masdechile/self.key;
    return 301 https://masdechile.cl$request_uri;
}

map $uri $servicio_viejo {
    default                            0;
    /servicios/limpiezas-campanas/     1;
    /servicios/limpiezas-campanas      1;
    /servicios/pinturas-corporativas/  1;
    /servicios/pinturas-corporativas   1;
    /servicios/ferreteria-industrial/  1;
    /servicios/ferreteria-industrial   1;
}

server {
    listen 80;
    listen [::]:80;
    server_name masdechile.cl;
    root /var/www/masdechile;
    index index.html;
    location = /api/cotizar { proxy_pass http://127.0.0.1:8790/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    if ($servicio_viejo) { return 301 /servicios/; }
    location ~ "^/servicios/([a-z0-9-]+)/[a-z0-9-]+/?$" { return 301 /servicios/$1/; }
    location / { try_files $uri $uri/ =404; }
    location ~* \.(webp|png|jpg|jpeg|svg|woff2?|css|js|ico|xml|txt|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name masdechile.cl;
    ssl_certificate     /etc/ssl/masdechile/self.crt;
    ssl_certificate_key /etc/ssl/masdechile/self.key;
    root /var/www/masdechile;
    index index.html;
    location = /api/cotizar { proxy_pass http://127.0.0.1:8790/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    if ($servicio_viejo) { return 301 /servicios/; }
    location ~ "^/servicios/([a-z0-9-]+)/[a-z0-9-]+/?$" { return 301 /servicios/$1/; }
    location / { try_files $uri $uri/ =404; }
    location ~* \.(webp|png|jpg|jpeg|svg|woff2?|css|js|ico|xml|txt|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
